<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nesa Inventory App Downloads</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="page">
      <header class="hero">
        <h1>Nesa Inventory App</h1>
      </header>

      <div class="card">
        <div class="qr-wrap">
          <img id="ios-qr" alt="iOS install QR" />
        </div>
        <div class="actions">
          <a id="ios-install" class="btn primary" href="#" aria-disabled="true"
            >Install on iPhone/iPad</a
          >
        </div>
        <ul class="notes">
          <li>Device UDID must be included in the provisioning profile.</li>
          <li>On first install, trust the developer profile in iOS settings if prompted.</li>
        </ul>
      </div>

      <footer class="footer">
        <p id="version">Version: -</p>
        <p id="updated">Updated: -</p>
      </footer>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
